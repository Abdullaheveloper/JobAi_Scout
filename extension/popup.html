<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>JobAI Auto-Fill</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; width: 340px; margin: 0; padding: 16px; color: #1a1a1a; background: #fff; }
    h1 { font-size: 15px; margin: 0 0 12px; display: flex; align-items: center; gap: 8px; }
    h1 .dot { width: 8px; height: 8px; background: #3b82f6; border-radius: 50%; }
    .row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; border-bottom: 1px solid #f0f0f0; gap: 12px; }
    .row span:first-child { color: #6b7280; flex-shrink: 0; }
    .row span:last-child { color: #1a1a1a; font-weight: 500; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    button { width: 100%; padding: 10px; background: #3b82f6; color: white; border: none; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 8px; }
    button:hover { background: #2563eb; }
    button.secondary { background: #f3f4f6; color: #1a1a1a; }
    button.danger { background: #fee2e2; color: #b91c1c; }
    .status { font-size: 12px; color: #10b981; text-align: center; margin-top: 8px; min-height: 16px; }
    .status.err { color: #b91c1c; }
    input { width: 100%; box-sizing: border-box; padding: 8px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; margin-top: 6px; }
    label { font-size: 12px; color: #6b7280; display:block; margin-top:8px; }
    .alert { background:#fef3c7; border:1px solid #fbbf24; padding:10px; border-radius:6px; font-size:12px; margin-top:10px; color:#78350f; }
    .alert strong { display:block; margin-bottom:6px; color:#92400e; }
    .alert ul { margin:6px 0 0 18px; padding:0; }
    .alert li { margin:2px 0; }
    .completion { background:#f8fafc; border:1px solid #dbeafe; padding:10px; border-radius:6px; margin-top:10px; }
    .completion h2 { font-size:13px; margin:0 0 4px; color:#1e3a8a; }
    .completion p { font-size:12px; color:#475569; margin:0 0 8px; }
    .completion textarea { width:100%; box-sizing:border-box; min-height:58px; padding:8px; border:1px solid #d1d5db; border-radius:6px; font-size:13px; margin-top:6px; resize:vertical; font-family:inherit; }
    .completion .hint { font-size:11px; color:#64748b; margin-top:6px; }
  </style>
</head>
<body>
  <h1><span class="dot"></span> JobAI Auto-Fill</h1>

  <div id="loginGate">
    <label for="emailInput">Email</label>
    <input id="emailInput" type="email" placeholder="you@example.com" />
    <label for="passInput">Password</label>
    <input id="passInput" type="password" placeholder="••••••••" />
    <button id="loginBtn">Sign in</button>
    <button id="googleLoginBtn" class="secondary">Continue with Google</button>
  </div>

  <div id="profile" style="display:none"></div>
  <div id="completionPopup" class="completion" style="display:none"></div>
  <div id="mismatch" class="alert" style="display:none"></div>
  <div id="missingFields" class="alert" style="display:none"></div>
  <button id="fillBtn" style="display:none">Verify &amp; fill this page</button>
  <button id="retryBtn" class="secondary" style="display:none">Retry verification</button>
  <button id="logoutBtn" class="danger" style="display:none">Sign out</button>
  <div class="status" id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
